services:
  postgres:
    image: postgres:16-alpine
    container_name: iot_postgres
    environment:
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: iotpass123
      POSTGRES_DB: iot_ai_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotuser -d iot_ai_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: iot_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://iotuser:iotpass123@postgres/iot_ai_platform
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: iot_dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
