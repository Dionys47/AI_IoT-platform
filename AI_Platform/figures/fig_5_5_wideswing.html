<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 30px; }
.container { max-width: 800px; width: 100%; text-align: center; }
h2 { font-size: 14pt; color: #333; margin-bottom: 16px; font-weight: normal; }
canvas { max-width: 100%; }
</style>
</head>
<body>
<div class="container">
<h2>Figura 5.5: Profili WIDE-SWING — lëkundje nga -10°C deri 60°C</h2>
<canvas id="chart"></canvas>
</div>
<script>
const labels = [];
const data = [];
for (let i = 0; i < 50; i++) {
  labels.push(i + 1);
  // Wide swing from -10 to 60
  const val = 25 + Math.sin(i * 0.15) * 35 + (Math.random() - 0.5) * 2;
  data.push(parseFloat(val.toFixed(1)));
}

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      label: 'Temperatura (°C)',
      data,
      borderColor: '#d32f2f',
      backgroundColor: 'rgba(211,47,47,0.08)',
      borderWidth: 2,
      pointRadius: 2,
      pointBackgroundColor: '#d32f2f',
      fill: true,
      tension: 0.2
    }]
  },
  options: {
    responsive: true,
    plugins: {
      tooltip: { enabled: true },
      legend: { labels: { font: { size: 11 } } }
    },
    scales: {
      x: { title: { display: true, text: 'Leximi' } },
      y: { title: { display: true, text: '°C' }, min: -15, max: 65 }
    }
  }
});
</script>
</body>
</html>
