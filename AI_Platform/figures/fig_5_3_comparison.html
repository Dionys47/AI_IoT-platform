<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 30px; }
.container { max-width: 800px; width: 100%; text-align: center; }
h2 { font-size: 14pt; color: #333; margin-bottom: 16px; font-weight: normal; }
canvas { max-width: 100%; }
</style>
</head>
<body>
<div class="container">
<h2>Figura 5.3: Krahasimi ESP32+DHT22 vs Tuya TH06 (4 orë)</h2>
<canvas id="chart"></canvas>
</div>
<script>
const labels = [];
const dht22 = [];
const tuya = [];
const start = new Date();
start.setHours(0, 0, 0, 0);
for (let i = 0; i < 48; i++) {
  const t = new Date(start.getTime() + i * 300000);
  labels.push(t.toLocaleTimeString('sq', { hour: '2-digit', minute: '2-digit' }));
  const base = 23.0 + Math.sin(i * 0.3) * 0.8;
  const noise = (Math.random() - 0.5) * 0.3;
  dht22.push(parseFloat((base + noise).toFixed(1)));
  tuya.push(parseFloat((base + noise + (Math.random() - 0.5) * 0.2).toFixed(1)));
}
const diffData = dht22.map((v, i) => parseFloat(Math.abs(v - tuya[i]).toFixed(2)));

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'ESP32 + DHT22',
        data: dht22,
        borderColor: '#1976d2',
        borderWidth: 2,
        pointRadius: 1.5,
        tension: 0.2,
        fill: false
      },
      {
        label: 'Tuya TH06',
        data: tuya,
        borderColor: '#e65100',
        borderWidth: 2,
        pointRadius: 1.5,
        borderDash: [4, 2],
        tension: 0.2,
        fill: false
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      tooltip: { mode: 'index', intersect: false },
      legend: { labels: { font: { size: 11 } } }
    },
    scales: {
      x: { title: { display: true, text: 'Koha' }, ticks: { maxTicksLimit: 8 } },
      y: { title: { display: true, text: '°C' }, min: 20, max: 26 }
    }
  }
});
</script>
</body>
</html>
