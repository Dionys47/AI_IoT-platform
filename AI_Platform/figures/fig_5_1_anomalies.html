<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 30px; }
.container { max-width: 800px; width: 100%; text-align: center; }
h2 { font-size: 14pt; color: #333; margin-bottom: 16px; font-weight: normal; }
canvas { max-width: 100%; }
</style>
</head>
<body>
<div class="container">
<h2>Figura 5.1: Zbulimi i anomalive — vlerat e shënuara në të kuqe në grafik</h2>
<canvas id="chart"></canvas>
</div>
<script>
const n = 60;
const labels = [];
const normalData = [];
const anomalyIndices = [7, 8, 9, 28, 44, 45, 46];
for (let i = 0; i < n; i++) {
  labels.push(i + 1);
  let val = 24.0 + Math.sin(i * 0.3) * 1.0 + (Math.random() - 0.5) * 0.3;
  if (anomalyIndices.includes(i)) {
    val += (Math.random() > 0.5 ? 3.5 : -3.5);
  }
  normalData.push(parseFloat(val.toFixed(1)));
}

const anomalyData = normalData.map((v, i) => anomalyIndices.includes(i) ? v : null);

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Temperatura (°C)',
        data: normalData,
        borderColor: '#1976d2',
        backgroundColor: 'rgba(25,118,210,0.08)',
        borderWidth: 2,
        pointRadius: 2,
        pointBackgroundColor: '#1976d2',
        fill: true,
        tension: 0.2
      },
      {
        label: 'Anomali',
        data: anomalyData,
        borderColor: 'rgba(0,0,0,0)',
        backgroundColor: 'rgba(0,0,0,0)',
        pointRadius: 8,
        pointBackgroundColor: '#d32f2f',
        pointBorderColor: '#b71c1c',
        pointBorderWidth: 2,
        pointStyle: 'circle'
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      tooltip: { enabled: false },
      legend: { labels: { font: { size: 11 } } }
    },
    scales: {
      x: { title: { display: true, text: 'Leximi' } },
      y: { title: { display: true, text: '°C' }, min: 18, max: 30 }
    }
  }
});
</script>
</body>
</html>
