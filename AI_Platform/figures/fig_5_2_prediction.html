<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.0/dist/chartjs-plugin-annotation.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 30px; }
.container { max-width: 800px; width: 100%; text-align: center; }
h2 { font-size: 14pt; color: #333; margin-bottom: 16px; font-weight: normal; }
canvas { max-width: 100%; }
</style>
</head>
<body>
<div class="container">
<h2>Figura 5.2: Parashikimi 24-orësh me breza besimi 95%</h2>
<canvas id="chart"></canvas>
</div>
<script>
const hist = 24;
const pred = 24;
const labels = [];
for (let i = 0; i < hist; i++) labels.push((i - hist + 1).toString());
for (let i = 1; i <= pred; i++) labels.push('+' + i);

const histData = [];
for (let i = 0; i < hist; i++) {
  histData.push(parseFloat((24.0 + Math.sin(i * 0.5) * 1.5 + (Math.random()-0.5)*0.3).toFixed(1)));
}
const predData = [];
const upper = [];
const lower = [];
let last = histData[histData.length - 1];
for (let i = 0; i < pred; i++) {
  const trend = last + Math.sin(i * 0.3) * 0.3;
  predData.push(parseFloat(trend.toFixed(1)));
  const band = 0.5 + i * 0.08;
  upper.push(parseFloat((trend + band).toFixed(1)));
  lower.push(parseFloat((trend - band).toFixed(1)));
  last = trend;
}

const fullHist = [...histData, ...Array(pred).fill(null)];
const fullPred = [...Array(hist).fill(null), ...predData];
const fullUpper = [...Array(hist).fill(null), ...upper];
const fullLower = [...Array(hist).fill(null), ...lower];

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Historiku',
        data: fullHist,
        borderColor: '#1976d2',
        borderWidth: 2,
        pointRadius: 2,
        pointBackgroundColor: '#1976d2',
        tension: 0.2,
        fill: false
      },
      {
        label: 'Brezi i sipërm (95%)',
        data: fullUpper,
        borderColor: 'rgba(0,0,0,0)',
        backgroundColor: 'rgba(255,152,0,0.25)',
        pointRadius: 0,
        fill: '+1'
      },
      {
        label: 'Brezi i poshtëm (95%)',
        data: fullLower,
        borderColor: 'rgba(0,0,0,0)',
        backgroundColor: 'rgba(255,152,0,0.25)',
        pointRadius: 0,
        fill: false
      },
      {
        label: 'Parashikimi',
        data: fullPred,
        borderColor: '#e65100',
        borderWidth: 2,
        borderDash: [5, 3],
        pointRadius: 3,
        pointBackgroundColor: '#e65100',
        tension: 0.2,
        fill: false
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      tooltip: { enabled: true },
      legend: { labels: { font: { size: 10 } } }
    },
    scales: {
      x: { title: { display: true, text: 'Orë' } },
      y: { title: { display: true, text: '°C' } }
    }
  }
});
</script>
</body>
</html>
